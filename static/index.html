<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google SecOps MCP Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── App ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Header ── */
        header {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        header h1 {
            font-size: 16px;
            color: #4ade80;
            font-weight: 600;
            white-space: nowrap;
        }
        header .status {
            font-size: 12px;
            color: #888;
            flex: 1;
            text-align: center;
        }
        header .status.connected { color: #4ade80; }

        /* ── Chat ── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .message {
            margin-bottom: 16px;
            max-width: 900px;
        }
        .message .role {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .message .role.user { color: #60a5fa; }
        .message .role.assistant { color: #4ade80; }
        .message .role.tool { color: #f59e0b; }
        .message .role.error { color: #ef4444; }
        .message .content {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message .content.tool-result {
            background: #0d1117;
            border-color: #f59e0b33;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* ── Input ── */
        #input-area {
            background: #111;
            border-top: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }
        #input-area input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        #input-area input:focus { border-color: #4ade80; }
        #input-area input::placeholder { color: #555; }
        #input-area button {
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        #input-area button:hover { background: #22c55e; }
        #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- ════════════ App ════════════ -->
    <div id="app">
        <header>
            <h1>🔒 Google SecOps MCP</h1>
            <div class="status" id="status">Connecting...</div>
        </header>

        <div id="chat"></div>

        <div id="input-area">
            <input type="text" id="input" placeholder="Ask anything... (e.g., 'check SCC findings' or 'enrich IP 8.8.8.8')" />
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // ── State ──
        let tools = [];

        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusEl = document.getElementById('status');

        // ── Chat Logic ──
        async function initChat() {
            try {
                const resp = await fetch('/health');
                const health = await resp.json();
                statusEl.textContent = `✅ ${health.tools} tools · ${health.project}`;
                statusEl.className = 'status connected';

                const toolResp = await fetch('/api/tools');
                if (toolResp.ok) {
                    tools = await toolResp.json();
                    showWelcome();
                }
            } catch (e) {
                statusEl.textContent = '❌ Connection failed';
                addMessage('error', 'Failed to connect to MCP server: ' + e.message);
            }
        }

        function showWelcome() {
            let msg = `Connected to Google SecOps MCP Server.\n\n`;
            msg += `${tools.length} tools available. Try:\n`;
            msg += `  • "check SCC findings for tito-436719"\n`;
            msg += `  • "enrich IP 198.51.100.42"\n`;
            msg += `  • "search SecOps for failed logins"\n`;
            msg += `  • "list recent detections"\n`;
            msg += `  • "tools" to see all available tools\n`;
            addMessage('assistant', msg);
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="role ${role}">${role}</div>
                <div class="content ${role === 'tool' ? 'tool-result' : ''}">${escapeHtml(content)}</div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳';

            if (text.toLowerCase() === 'tools') {
                let toolList = 'Available tools:\n\n';
                tools.forEach(t => {
                    toolList += `  ${t.name}\n    ${t.description || ''}\n\n`;
                });
                addMessage('assistant', toolList);
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                return;
            }

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                const data = await resp.json();

                if (data.tool_called) {
                    addMessage('tool', `⚡ ${data.tool_called}(${JSON.stringify(data.tool_args)})\n\n${JSON.stringify(data.tool_result, null, 2)}`);
                }
                if (data.response) {
                    addMessage('assistant', data.response);
                }
                if (data.error) {
                    addMessage('error', data.error);
                }
            } catch (e) {
                addMessage('error', 'Request failed: ' + e.message);
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        // ── Boot ──
        initChat();
    </script>
</body>
</html>
